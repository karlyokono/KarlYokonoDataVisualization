<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earth's Warming Record · NASA GISS</title>

  <!-- Synchronous loading: both libraries guaranteed ready before body script runs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://unpkg.com/d3-annotation@2.5.1/d3-annotation.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      color: #1a2332;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      width: 100%;
      max-width: 700px;
      padding: 20px 20px 4px;
    }

    .eyebrow {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: #c0392b;
      margin-bottom: 5px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.25;
      min-height: 52px;
    }

    .scene-sub {
      font-size: 12.5px;
      color: #5a6478;
      margin-top: 3px;
      min-height: 20px;
    }

    #chart-container {
      width: 100%;
      max-width: 700px;
      padding: 4px 16px 0;
    }

    #chart-container svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── Axis ── */
    .axis text        { font-size: 10px; fill: #8492a6; font-family: inherit; }
    .axis path        { stroke: #d0d7e2; }
    .axis line        { stroke: #e8edf3; }
    .axis.y-ax .domain { display: none; }

    /* ── Grid ── */
    .grid line        { stroke: #f0f3f7; stroke-dasharray: 2 3; }
    .grid .domain     { display: none; }

    /* ── d3-annotation ── */
    .annotation path               { fill: none; stroke: #7f8c9a; stroke-width: 1; }
    .annotation text               { font-family: inherit; }
    .annotation-note-bg            { fill: rgba(255,255,255,.92); stroke: #d4dbe6; stroke-width: .75; }
    .annotation-note-title         { font-size: 11px; font-weight: 600; fill: #2c3e50; }
    .annotation-note-label         { font-size: 10px; fill: #5a6478; }

    /* ── Nav ── */
    nav.bottom-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 700px;
      padding: 10px 20px 16px;
      gap: 12px;
    }

    .nav-btn {
      padding: 7px 16px;
      font-size: 12.5px;
      font-weight: 500;
      font-family: inherit;
      border: 1.5px solid #1a2332;
      border-radius: 18px;
      background: transparent;
      color: #1a2332;
      cursor: pointer;
      transition: background .15s, color .15s;
      min-width: 82px;
    }
    .nav-btn:hover:not(:disabled) { background: #1a2332; color: #fff; }
    .nav-btn:disabled              { border-color: #cdd3dc; color: #cdd3dc; cursor: default; }

    .cnav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .dots { display: flex; gap: 7px; }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      border: 1.5px solid #b0b9c6;
      background: transparent;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .dot.active { background: #c0392b; border-color: #c0392b; }

    .scene-ctr { font-size: 11px; color: #8492a6; }

    .source-note {
      font-size: 10px;
      color: #aab4c0;
      width: 100%;
      max-width: 700px;
      padding: 0 20px 12px;
      text-align: right;
    }
  </style>
</head>
<body>

<header>
  <div class="eyebrow">Climate Data · NASA GISS</div>
  <h1 id="scene-title">The Long View: 144 Years of Temperature Records</h1>
  <p class="scene-sub" id="scene-sub">Annual global surface temperature anomaly relative to the 1951–1980 average</p>
</header>

<div id="chart-container"></div>

<nav class="bottom-nav">
  <button class="nav-btn" id="btn-prev" onclick="changeScene(-1)" disabled>← Prev</button>
  <div class="cnav">
    <div class="dots" id="dots"></div>
    <span class="scene-ctr" id="scene-ctr">1 of 3</span>
  </div>
  <button class="nav-btn" id="btn-next" onclick="changeScene(1)">Next →</button>
</nav>

<p class="source-note">Source: NASA GISS Surface Temperature Analysis (GISTEMP v4)</p>

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  DATA  —  NASA GISS LOTI annual anomalies (°C vs 1951–1980 baseline)
// ─────────────────────────────────────────────────────────────────────────────
const DATA = [
  {y:1880,v:-.16},{y:1881,v:-.08},{y:1882,v:-.11},{y:1883,v:-.17},
  {y:1884,v:-.28},{y:1885,v:-.33},{y:1886,v:-.31},{y:1887,v:-.36},
  {y:1888,v:-.27},{y:1889,v:-.17},{y:1890,v:-.35},{y:1891,v:-.22},
  {y:1892,v:-.27},{y:1893,v:-.31},{y:1894,v:-.32},{y:1895,v:-.23},
  {y:1896,v:-.11},{y:1897,v:-.11},{y:1898,v:-.27},{y:1899,v:-.17},
  {y:1900,v:-.08},{y:1901,v:-.15},{y:1902,v:-.28},{y:1903,v:-.37},
  {y:1904,v:-.47},{y:1905,v:-.26},{y:1906,v:-.22},{y:1907,v:-.39},
  {y:1908,v:-.43},{y:1909,v:-.48},{y:1910,v:-.43},{y:1911,v:-.44},
  {y:1912,v:-.36},{y:1913,v:-.35},{y:1914,v:-.15},{y:1915,v:-.14},
  {y:1916,v:-.36},{y:1917,v:-.46},{y:1918,v:-.30},{y:1919,v:-.27},
  {y:1920,v:-.27},{y:1921,v:-.19},{y:1922,v:-.28},{y:1923,v:-.26},
  {y:1924,v:-.27},{y:1925,v:-.22},{y:1926,v:-.10},{y:1927,v:-.21},
  {y:1928,v:-.23},{y:1929,v:-.36},{y:1930,v:-.09},{y:1931,v:-.08},
  {y:1932,v:-.11},{y:1933,v:-.27},{y:1934,v:-.15},{y:1935,v:-.20},
  {y:1936,v:-.15},{y:1937,v:-.02},{y:1938,v:.00},{y:1939,v:-.02},
  {y:1940,v:.09},{y:1941,v:.19},{y:1942,v:.07},{y:1943,v:.09},
  {y:1944,v:.20},{y:1945,v:.09},{y:1946,v:-.07},{y:1947,v:-.03},
  {y:1948,v:-.06},{y:1949,v:-.08},{y:1950,v:-.17},{y:1951,v:.01},
  {y:1952,v:.02},{y:1953,v:.08},{y:1954,v:-.13},{y:1955,v:-.14},
  {y:1956,v:-.15},{y:1957,v:.05},{y:1958,v:.06},{y:1959,v:.03},
  {y:1960,v:-.03},{y:1961,v:.06},{y:1962,v:.03},{y:1963,v:.05},
  {y:1964,v:-.20},{y:1965,v:-.11},{y:1966,v:-.07},{y:1967,v:-.02},
  {y:1968,v:-.06},{y:1969,v:.08},{y:1970,v:.03},{y:1971,v:-.08},
  {y:1972,v:.01},{y:1973,v:.16},{y:1974,v:-.07},{y:1975,v:-.01},
  {y:1976,v:-.10},{y:1977,v:.18},{y:1978,v:.07},{y:1979,v:.16},
  {y:1980,v:.26},{y:1981,v:.32},{y:1982,v:.14},{y:1983,v:.31},
  {y:1984,v:.16},{y:1985,v:.12},{y:1986,v:.18},{y:1987,v:.33},
  {y:1988,v:.40},{y:1989,v:.29},{y:1990,v:.45},{y:1991,v:.41},
  {y:1992,v:.23},{y:1993,v:.24},{y:1994,v:.31},{y:1995,v:.45},
  {y:1996,v:.35},{y:1997,v:.46},{y:1998,v:.63},{y:1999,v:.40},
  {y:2000,v:.42},{y:2001,v:.54},{y:2002,v:.63},{y:2003,v:.62},
  {y:2004,v:.54},{y:2005,v:.68},{y:2006,v:.61},{y:2007,v:.66},
  {y:2008,v:.54},{y:2009,v:.64},{y:2010,v:.72},{y:2011,v:.61},
  {y:2012,v:.64},{y:2013,v:.68},{y:2014,v:.75},{y:2015,v:.90},
  {y:2016,v:1.01},{y:2017,v:.92},{y:2018,v:.85},{y:2019,v:.98},
  {y:2020,v:1.02},{y:2021,v:.85},{y:2022,v:.89},{y:2023,v:1.17},
  {y:2024,v:1.29}
];

// ─────────────────────────────────────────────────────────────────────────────
//  SCENE METADATA
// ─────────────────────────────────────────────────────────────────────────────
const SCENES = [
  {
    title : "The Long View: 144 Years of Temperature Records",
    sub   : "Annual global surface temperature anomaly relative to the 1951–1980 average"
  },
  {
    title : "Warming Is Accelerating Decade by Decade",
    sub   : "Average anomaly per decade — the gap between past and present is widening fast"
  },
  {
    title : "All 10 Hottest Years Have Occurred Since 2015",
    sub   : "The 10 warmest years in the 144-year instrumental record, ranked by anomaly"
  }
];

// ─────────────────────────────────────────────────────────────────────────────
//  PARAMETERS  (state variables)
// ─────────────────────────────────────────────────────────────────────────────
let currentScene = 0;

// ─────────────────────────────────────────────────────────────────────────────
//  CONSTANTS  — defined here now that D3 is synchronously loaded
// ─────────────────────────────────────────────────────────────────────────────
const W  = 660;
const M  = { top: 32, right: 26, bottom: 54, left: 62 };
const iW = W - M.left - M.right; // 572

// Color scale: blue (cold/negative) → yellow (neutral) → red (hot/positive)
// Domain reversed so high anomaly = red, low/negative = blue
const clr = d3.scaleSequential(d3.interpolateRdYlBu).domain([1.3, -0.5]);

// ─────────────────────────────────────────────────────────────────────────────
//  SVG FACTORY
// ─────────────────────────────────────────────────────────────────────────────
function makeSVG(H) {
  const iH = H - M.top - M.bottom;
  const svg = d3.select("#chart-container")
    .append("svg")
    .attr("viewBox", `0 0 ${W} ${H}`);
  const g = svg.append("g")
    .attr("transform", `translate(${M.left},${M.top})`);
  return { g, iH };
}

function addYGrid(g, yScale, ticks) {
  g.append("g").attr("class", "grid")
    .call(d3.axisLeft(yScale).ticks(ticks).tickSize(-iW).tickFormat(""));
}

function addZeroLine(g, yScale) {
  g.append("line")
    .attr("x1", 0).attr("y1", yScale(0))
    .attr("x2", iW).attr("y2", yScale(0))
    .attr("stroke", "#b8c1cc")
    .attr("stroke-width", 1)
    .attr("stroke-dasharray", "4 3");
}

function addYLabel(g, iH, label) {
  g.append("text")
    .attr("transform", "rotate(-90)")
    .attr("y", -M.left + 14).attr("x", -iH / 2)
    .attr("text-anchor", "middle")
    .attr("fill", "#8492a6").attr("font-size", 10)
    .text(label);
}

function callAnnotations(g, type, accessors, annotations) {
  // Graceful: skip if d3-annotation didn't attach correctly
  if (typeof d3.annotation !== "function") return;
  try {
    g.append("g").attr("class", "annotations").call(
      d3.annotation().type(type).accessors(accessors).annotations(annotations)
    );
  } catch (e) {
    console.warn("d3-annotation error:", e);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  SCENE 0 — LINE CHART
// ─────────────────────────────────────────────────────────────────────────────
function renderScene0() {
  const H = 380;
  const { g, iH } = makeSVG(H);

  const x = d3.scaleLinear().domain([1880, 2024]).range([0, iW]);
  const y = d3.scaleLinear().domain([-0.65, 1.45]).range([iH, 0]);

  addYGrid(g, y, 7);
  addZeroLine(g, y);

  // Subtle area fills
  const area = (yFn) => d3.area()
    .x(d => x(d.y)).y0(y(0)).y1(d => y(yFn(d.v))).curve(d3.curveMonotoneX);

  g.append("path").datum(DATA)
    .attr("d", area(v => Math.max(0, v)))
    .attr("fill", "#e74c3c").attr("fill-opacity", .09);

  g.append("path").datum(DATA)
    .attr("d", area(v => Math.min(0, v)))
    .attr("fill", "#3498db").attr("fill-opacity", .10);

  // ── Signature element: segments colored by temperature ──
  // Pre-build segment data so D3 join handles it safely
  const segs = DATA.slice(1).map((d, i) => ({
    x1: x(DATA[i].y), y1: y(DATA[i].v),
    x2: x(d.y),       y2: y(d.v),
    c : clr((DATA[i].v + d.v) / 2)
  }));

  g.selectAll(".cseg").data(segs).join("line")
    .attr("class",          "cseg")
    .attr("x1",             d => d.x1).attr("y1", d => d.y1)
    .attr("x2",             d => d.x2).attr("y2", d => d.y2)
    .attr("stroke",         d => d.c)
    .attr("stroke-width",   2.2)
    .attr("stroke-linecap", "round");

  // Axes
  g.append("g").attr("class", "axis x-ax")
    .attr("transform", `translate(0,${iH})`)
    .call(d3.axisBottom(x).ticks(8).tickFormat(d3.format("d")));

  g.append("g").attr("class", "axis y-ax")
    .call(d3.axisLeft(y).ticks(7)
      .tickFormat(d => (d >= 0 ? "+" : "") + d.toFixed(1) + "°C"));

  addYLabel(g, iH, "Temperature anomaly (°C vs 1951–80)");

  // Annotations
  callAnnotations(g, d3.annotationCallout,
    { x: d => x(d.y), y: d => y(d.v) },
    [
      {
        note: { title: "1988", label: "James Hansen's Senate testimony makes climate change a public issue", wrap: 155, padding: 4 },
        data: { y: 1988, v: 0.40 }, dx: -28, dy: -68
      },
      {
        note: { title: "2016  +1.01°C", label: "El Niño pushes global temps to a then-record high", wrap: 152, padding: 4 },
        data: { y: 2016, v: 1.01 }, dx: -118, dy: -28
      },
      {
        note: { title: "2024  +1.29°C", label: "Hottest year in the 144-year instrumental record", wrap: 148, padding: 4 },
        data: { y: 2024, v: 1.29 }, dx: -122, dy: 32
      }
    ]
  );

  // ── SVG tooltip ──
  const bisect = d3.bisector(d => d.y).left;
  const vLine  = g.append("line").attr("y1", 0).attr("y2", iH)
    .attr("stroke", "#8492a6").attr("stroke-width", 1)
    .attr("stroke-dasharray", "3 2").style("opacity", 0).attr("pointer-events", "none");
  const dot = g.append("circle").attr("r", 5)
    .attr("stroke", "#fff").attr("stroke-width", 1.5)
    .style("opacity", 0).attr("pointer-events", "none");
  const tipG  = g.append("g").style("opacity", 0).attr("pointer-events", "none");
  const tipBg = tipG.append("rect").attr("rx", 3).attr("height", 26).attr("y", -13).attr("fill", "#1a2332");
  const tipTx = tipG.append("text").attr("fill", "#fff").attr("font-size", 11.5)
    .attr("dominant-baseline", "central").attr("y", 0).attr("x", 8);

  g.append("rect").attr("width", iW).attr("height", iH)
    .attr("fill", "none").attr("pointer-events", "all").style("cursor", "crosshair")
    .on("mousemove", function(event) {
      const [mx] = d3.pointer(event, this);
      const yr = x.invert(mx);
      const i  = bisect(DATA, yr, 1);
      const d0 = DATA[i - 1], d1 = DATA[i] || d0;
      const d  = (yr - d0.y > d1.y - yr) ? d1 : d0;
      const cx = x(d.y), cy = y(d.v);
      vLine.attr("x1", cx).attr("x2", cx).style("opacity", 1);
      dot.attr("cx", cx).attr("cy", cy).attr("fill", clr(d.v)).style("opacity", 1);
      const lbl = `${d.y}   ${d.v >= 0 ? "+" : ""}${d.v.toFixed(2)}°C`;
      tipTx.text(lbl);
      const tw = lbl.length * 6.8 + 16;
      tipBg.attr("width", tw);
      tipG.attr("transform", `translate(${Math.min(cx + 8, iW - tw - 4)},${Math.max(16, cy - 18)})`)
          .style("opacity", 1);
    })
    .on("mouseleave", () => {
      vLine.style("opacity", 0);
      dot.style("opacity", 0);
      tipG.style("opacity", 0);
    });
}

// ─────────────────────────────────────────────────────────────────────────────
//  SCENE 1 — DECADE BAR CHART
// ─────────────────────────────────────────────────────────────────────────────
function renderScene1() {
  const H = 380;
  const { g, iH } = makeSVG(H);

  const decMap = d3.rollup(
    DATA,
    v => d3.mean(v, d => d.v),
    d => Math.floor(d.y / 10) * 10
  );
  const decades = Array.from(decMap, ([decade, avg]) => ({ decade, avg }))
    .sort((a, b) => a.decade - b.decade);

  const x = d3.scaleBand().domain(decades.map(d => d.decade)).range([0, iW]).padding(0.22);
  const y = d3.scaleLinear().domain([-0.55, 1.15]).range([iH, 0]);

  addYGrid(g, y, 7);
  addZeroLine(g, y);

  // Bars
  g.selectAll(".bar").data(decades).join("rect")
    .attr("class",  "bar")
    .attr("x",      d => x(d.decade))
    .attr("y",      d => d.avg >= 0 ? y(d.avg) : y(0))
    .attr("width",  x.bandwidth())
    .attr("height", d => Math.abs(y(d.avg) - y(0)))
    .attr("fill",   d => clr(d.avg))
    .attr("rx",     2);

  // Value labels
  g.selectAll(".blbl").data(decades).join("text")
    .attr("class",        "blbl")
    .attr("x",            d => x(d.decade) + x.bandwidth() / 2)
    .attr("y",            d => d.avg >= 0 ? y(d.avg) - 4 : y(0) + 11)
    .attr("text-anchor",  "middle")
    .attr("font-size",    8.5)
    .attr("fill",         "#8492a6")
    .text(d => (d.avg >= 0 ? "+" : "") + d.avg.toFixed(2));

  // Axes
  g.append("g").attr("class", "axis x-ax")
    .attr("transform", `translate(0,${iH})`)
    .call(d3.axisBottom(x).tickFormat(d => `${d}s`));

  g.append("g").attr("class", "axis y-ax")
    .call(d3.axisLeft(y).ticks(7)
      .tickFormat(d => (d >= 0 ? "+" : "") + d.toFixed(1) + "°C"));

  addYLabel(g, iH, "Avg anomaly (°C vs 1951–80)");

  // Annotations
  const avg1880 = decMap.get(1880);
  const avg2020 = decMap.get(2020);

  callAnnotations(g, d3.annotationCallout,
    { x: d => x(d.decade) + x.bandwidth() / 2, y: d => y(d.avg) },
    [
      {
        note: { title: `1880s  ${avg1880 >= 0 ? "+" : ""}${avg1880.toFixed(2)}°C`, label: "Near baseline — temperatures hovered close to the pre-industrial average", wrap: 162, padding: 4 },
        data: { decade: 1880, avg: avg1880 }, dx: 48, dy: -58
      },
      {
        note: { title: `2020s  +${avg2020.toFixed(2)}°C`, label: "On track to be the hottest decade ever recorded (2020–24 so far)", wrap: 165, padding: 4 },
        data: { decade: 2020, avg: avg2020 }, dx: -100, dy: -42
      }
    ]
  );
}

// ─────────────────────────────────────────────────────────────────────────────
//  SCENE 2 — LOLLIPOP: TOP 10 HOTTEST YEARS
// ─────────────────────────────────────────────────────────────────────────────
function renderScene2() {
  const H = 420;
  const { g, iH } = makeSVG(H);

  // Sort DESCENDING so the hottest year is first in domain → appears at the top
  const top10 = [...DATA].sort((a, b) => b.v - a.v).slice(0, 10);

  const x = d3.scaleLinear().domain([0.72, 1.38]).range([0, iW]);

  // range([0, iH]): domain[0] (2024, highest) → y near 0 (top of chart)
  //                 domain[9] (coolest of top 10) → y near iH (bottom)
  const y = d3.scaleBand()
    .domain(top10.map(d => d.y))
    .range([0, iH])
    .padding(0.35);

  const bw = y.bandwidth();

  // Vertical reference grid
  g.append("g").attr("class", "grid")
    .call(d3.axisBottom(x).ticks(6).tickSize(iH).tickFormat(""))
    .select(".domain").remove();

  // Stems
  g.selectAll(".stem").data(top10).join("line")
    .attr("class",        "stem")
    .attr("x1",           x(0.72))
    .attr("x2",           d => x(d.v))
    .attr("y1",           d => y(d.y) + bw / 2)
    .attr("y2",           d => y(d.y) + bw / 2)
    .attr("stroke",       d => clr(d.v))
    .attr("stroke-width", 2)
    .attr("opacity",      0.65);

  // Dots
  g.selectAll(".ldot").data(top10).join("circle")
    .attr("class",        "ldot")
    .attr("cx",           d => x(d.v))
    .attr("cy",           d => y(d.y) + bw / 2)
    .attr("r",            7)
    .attr("fill",         d => clr(d.v))
    .attr("stroke",       "#fff")
    .attr("stroke-width", 1.5);

  // Value labels
  g.selectAll(".vlbl").data(top10).join("text")
    .attr("class",             "vlbl")
    .attr("x",                 d => x(d.v) + 13)
    .attr("y",                 d => y(d.y) + bw / 2)
    .attr("dominant-baseline", "central")
    .attr("font-size",         10.5)
    .attr("fill",              "#5a6478")
    .text(d => `+${d.v.toFixed(2)}°C`);

  // Axes
  g.append("g").attr("class", "axis x-ax")
    .attr("transform", `translate(0,${iH})`)
    .call(d3.axisBottom(x).ticks(6).tickFormat(d => `+${d.toFixed(2)}°C`));

  g.append("g").attr("class", "axis y-ax")
    .call(d3.axisLeft(y).tickFormat(d3.format("d")));

  g.append("text")
    .attr("x", iW / 2).attr("y", iH + 46)
    .attr("text-anchor", "middle").attr("fill", "#8492a6").attr("font-size", 10)
    .text("Temperature anomaly (°C above 1951–1980 average)");

  // Annotations — point at top (2024) and bottom entry
  const hottest = top10[0];                    // 2024 — at top of chart
  const lowest  = top10[top10.length - 1];     // coolest of the 10 — at bottom

  callAnnotations(g, d3.annotationCallout,
    { x: d => x(d.v), y: d => y(d.y) + y.bandwidth() / 2 },
    [
      {
        note: { title: "All within a 10-year window", label: "Every one of the top 10 hottest years has occurred since 2015", wrap: 155, padding: 4 },
        data: lowest, dx: -90, dy: 30
      },
      {
        note: { title: "2024  +1.29°C", label: "0.12°C above 2023 — the largest single-year jump in modern records", wrap: 150, padding: 4 },
        data: hottest, dx: -100, dy: 30
      }
    ]
  );
}

// ─────────────────────────────────────────────────────────────────────────────
//  NAVIGATION  (triggers → parameter changes → scene re-render)
// ─────────────────────────────────────────────────────────────────────────────
function changeScene(delta) {
  currentScene = Math.max(0, Math.min(SCENES.length - 1, currentScene + delta));
  renderScene(currentScene);
}

function renderScene(n) {
  d3.select("#chart-container").html("");

  document.getElementById("scene-title").textContent = SCENES[n].title;
  document.getElementById("scene-sub").textContent   = SCENES[n].sub;
  document.getElementById("scene-ctr").textContent   = `${n + 1} of ${SCENES.length}`;
  document.getElementById("btn-prev").disabled        = (n === 0);
  document.getElementById("btn-next").disabled        = (n === SCENES.length - 1);

  document.querySelectorAll(".dot")
    .forEach((el, i) => el.classList.toggle("active", i === n));

  if      (n === 0) renderScene0();
  else if (n === 1) renderScene1();
  else              renderScene2();
}

// ─────────────────────────────────────────────────────────────────────────────
//  INIT  — D3 is already loaded (sync <script> in <head>); start immediately
// ─────────────────────────────────────────────────────────────────────────────
const dotsEl = document.getElementById("dots");
SCENES.forEach((_, i) => {
  const dot     = document.createElement("div");
  dot.className = "dot" + (i === 0 ? " active" : "");
  dot.title     = `Scene ${i + 1}`;
  dot.onclick   = () => { currentScene = i; renderScene(i); };
  dotsEl.appendChild(dot);
});

renderScene(0);
</script>
</body>
</html>
